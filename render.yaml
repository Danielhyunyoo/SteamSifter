# Render Blueprint for SteamSifter. In the Render dashboard, create a new
# Blueprint from this repo, then set the OPENAI_API_KEY secret when prompted.
services:
  - type: web
    name: steamsifter
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Worker count is env-driven (WEB_CONCURRENCY, default 1). Job state and rate
    # limits are shared via Redis, so more than one worker is safe; bump
    # WEB_CONCURRENCY once you outgrow the free tier's memory.
    startCommand: gunicorn --pythonpath src --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-1} --threads 8 --timeout 120 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false   # set this secret in the Render dashboard; never committed
      - key: REDIS_URL
        sync: false   # Upstash Redis connection URL, for the persistent cache
